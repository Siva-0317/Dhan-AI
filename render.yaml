services:
  - type: web
    name: dhan-i-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python -m rag.seed"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port 10000"
    autoDeploy: false
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CHROMA_CACHE_DIR
        value: "/opt/render/project/src/.chroma_cache"
      - key: HF_HOME
        value: "/opt/render/project/src/.hf_cache"
      - key: PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK
        value: "True"
